 LOADING_TIP_0: "No government in the world kills its people, unless it's led by a crazy person. — Bashar al-Assad"
 LOADING_TIP_1: "Listen, you American pigs: I have been to your country three times. I saw how you train soldiers to kill Muslims. God willing, I will come to your cities with this weapon. — Gulmurod Khalimov"
 LOADING_TIP_2: "The flames of war are only beginning to intensify. — Mohammed Khalifa"
 LOADING_TIP_3: "You are either with us, or against us. — George W. Bush after 9/11"
 LOADING_TIP_4: "[Enemies of Syria] are the enemies of the people and the enemies of God. And the enemies of God will go to hell. — Bashar al-Assad"
 LOADING_TIP_5: "Fighting terrorists is like a video game. You can destroy your enemy, but the game will generate and regenerate thousands of enemies. — Bashar Al-Assad"
 LOADING_TIP_6: "Abu Bakr al Baghdadi, He died like a dog... He died like a coward. The world is now a much safer place. — POTUS45 Donald J. Trump"
 LOADING_TIP_7: "Do not be afraid of their numbers or their equipment, for Allah is with the patient and He will grant victory to those who support His cause. — Abu Muhammad Al-Adnani"
 LOADING_TIP_8: "They seek to extinguish God’s light with their mouths, but God will not allow except that His light should be perfected, however much the unbelievers may detest it. - Abu Bakr al-Baghdadi"
 LOADING_TIP_9: "If you can kill a disbelieving American or European – especially the spiteful and filthy French – or an Australian, or a Canadian... then rely upon Allah, and kill him in any manner... - Abu Muhammad al-Adnani"
 LOADING_TIP_10: "As for the believer, his ally is Allah; he relies on Him with a heart filled with fear and awe. — Mohammed Khalifa"
 LOADING_TIP_11: "To kill and be killed as they defend Darul Islam, while destroying the taghut regime and the anchors holding it in place. — Mohammed Khalifa"
 LOADING_TIP_12: "You will face men who love death as much as you love life. — Khalid Ibn Al-Walid"
 LOADING_TIP_13: "O soldiers of the State, be like the mountain. Do not let the gathering of the nations against you shake your certainty. — Abu Bakr al-Baghdadi"
 LOADING_TIP_14: "Victory is gained through strategy and trust in Allah, not by wishful thinking — Umar ibn al-Khattab"
 LOADING_TIP_15: "May the eyes of cowards never sleep. — Khalid ibn al-Walid"
 LOADING_TIP_16: "The greatest victory is the one which requires no battle. - Ali Ibn Abi Talib"
 LOADING_TIP_17: "Syria is the backbone of the resistance, and the resistance cannot sit idly by while its back is being broken. — Hassan Nasrallah"
 LOADING_TIP_18: "If Syria falls, Palestine will be lost, and the resistance will be besieged from all sides. — Hassan Nasrallah"
 LOADING_TIP_19: "This Israel, which possesses nuclear weapons and the strongest air force in the region, is more fragile than a spider's web. — Hassan Nasrallah"
 LOADING_TIP_20: "I want to put the question to the whole Ummah: Is not our goal of an Islamic State a common aim? Why do you not join us? — Abu Omar al-Shishani"
 LOADING_TIP_21: "We are at war with the tyrant before us, and if the same tyrant is behind us, we don't see any difference with whom we fight. — Abu Omar al-Shishani"
 LOADING_TIP_22: "O soldiers of the Islamic State, be firm, for you are on the truth. Be firm, for Allah is with you. — Abu Bakr al-Baghdadi"
 LOADING_TIP_23: "This is the promise of Allah. The Khilafah has returned to the earth, and the sun of the State has risen. — Abu Muhammad al-Adnani"
 LOADING_TIP_24: "I am not a politician. I am a soldier. And in the military, we don't talk, we act. — Abdel Fattah el-Sisi"
 LOADING_TIP_25: "We have thousands of men who love death more than you love life; the walls you build will not protect you from our reach. — Abu Obeida"
 LOADING_TIP_26: "We are not aiming to establish a national Kurdish state in Syria. We aim for a decentralized, democratic Syria where all peoples enjoy freedom. — Salih Muslim"
 LOADING_TIP_27: "Our battle in the Levant is the spearhead of the global struggle. If the flame is extinguished here, the whole Ummah will remain in darkness. — Ayman al-Zawahiri"
 LOADING_TIP_28: "Assad, or we burn the country. —  Shabiha Slogan"
 LOADING_TIP_29: "Zamu sayarrrr... Zamu sayarrrrrrrr! Shekau, Shekakau, Shekau-kau-ka-kau-kau, ka-ka-ka-ka-ka-kau! Uwuwuwuwuuu... This is the Shekau if you didn't know! — Abubakar Shekau"
 LOADING_TIP_30: "Salafis are disbelievers! Arnane! Tijjaniyah are disbelievers! Arnane! Qadiriyyah are disbelievers! Arnane! Shaziliyya are disbelievers! Arnane! Democracy is disbelievers! Arnane! — Abubakar Shekau"